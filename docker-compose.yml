version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autonomous-artist
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN}
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID}
      - IMGUR_CLIENT_ID=${IMGUR_CLIENT_ID}
      - DEBUG=false
      - RATE_LIMIT_ENABLED=true
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ./static/generations:/app/static/generations
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./artist_memory.json:/app/artist_memory.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - artist-network

  nginx:
    image: nginx:alpine
    container_name: autonomous-artist-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - artist-network

networks:
  artist-network:
    driver: bridge
